services:
  # Единый фасад над MWS GPT: OpenAI-совместимый прокси для Open WebUI + агент-цикл.
  # Все чат-запросы из UI проходят через агент-цикл, чтобы в них автоматически попадали тулы.
  api:
    build: .
    command:
      - uv
      - run
      - --no-sync
      - uvicorn
      - certified_turtles.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --log-level
      - error
      - --no-access-log
      - --reload
      - --reload-dir
      - /app/src
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      # Потоковый вывод Python в логах Docker (иначе буфер до конца запроса).
      PYTHONUNBUFFERED: "1"
      MWS_API_KEY: ${MWS_API_KEY:-}
      MWS_API_BASE: ${MWS_API_BASE:-https://api.gpt.mws.ru}
      # ASR: id модели в MWS (см. GET /v1/models); whisper-1 на MWS может отсутствовать.
      CT_ASR_MODEL: ${CT_ASR_MODEL:-whisper-medium}
      GENERATED_FILES_DIR: /data/generated
      UPLOADS_DIR: /data/generated/uploads
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8000}
      # Интерпретатор из образа (Dockerfile); локально без Docker — .venv-gpt-researcher или GPT_RESEARCHER_PYTHON
      GPT_RESEARCHER_PYTHON: ${GPT_RESEARCHER_PYTHON:-/opt/gpt-researcher-venv/bin/python}
      # Подробный трейс агента на stderr: [agent-debug] … Смотреть: docker compose logs -f api
      # Выключить шум: CT_AGENT_DEBUG=0 в .env
      CT_AGENT_DEBUG: ${CT_AGENT_DEBUG:-1}
      CT_AGENT_DEBUG_MAX_CHARS: ${CT_AGENT_DEBUG_MAX_CHARS:-}
      # MWS Tables (tabs.mts.ru): токен из настроек профиля.
      MWS_TABLES_API_TOKEN: ${MWS_TABLES_API_TOKEN:-}
      MWS_TABLES_API_BASE: ${MWS_TABLES_API_BASE:-https://tables.mws.ru/fusion/v1}
      # Google Docs: JSON service account + расшарить документ на client_email из ключа.
      # Раскомментируйте обе строки и положите ключ на хост, либо задайте абсолютный путь к файлу на хосте.
      # GOOGLE_DOCS_CREDENTIALS_JSON: /secrets/google-docs-sa.json
    volumes:
      - generated-files:/data/generated
      - ./src:/app/src
      # Пример монтирования ключа (рядом с compose: mkdir -p secrets && cp sa.json secrets/google-docs-sa.json):
      # - ./secrets/google-docs-sa.json:/secrets/google-docs-sa.json:ro
    restart: unless-stopped

  open-webui:
    # Open WebUI: единый источник правок UI в директории open-webui.
    build:
      context: ./open-webui
      dockerfile: Dockerfile
      args:
        # Стабильный кеш: одно и то же значение при `docker compose build` без лишних --build-arg.
        # На 8 ГБ RAM хоста дефолт 3072; при «heap out of memory» (не SIGKILL) подними, напр. 4096.
        NODE_HEAP_MB: ${NODE_HEAP_MB:-3072}
        # Не качает sentence-transformers/whisper в слое pip при сборке — меньше диска и времени (RAG при первом use).
        USE_SLIM: "${OPEN_WEBUI_USE_SLIM:-true}"
    image: certified-turtles-open-webui:local
    container_name: open-webui
    depends_on:
      - api
    ports:
      - "${OPEN_WEBUI_PORT:-3000}:8080"
    volumes:
      - open-webui-data:/app/backend/data
    env_file:
      - path: .env
        required: false
    environment:
      # Ollama не используем. OpenAI-совместимый источник — наш FastAPI (tools + agent loop).
      ENABLE_OLLAMA_API: "False"
      ENABLE_OPENAI_API: "True"
      OPENAI_API_KEY: ${MWS_API_KEY:-}
      # По умолчанию Open WebUI ходит в API контейнер. Для локального API можно переопределить env.
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-http://api:8000/v1}
      # Голос: Web STT блокирует «режим звонка» в UI ($config.audio.stt.engine === 'web').
      # Серверный ASR: тот же OPENAI_API_BASE_URL + /v1/audio/transcriptions (прокси api → MWS).
      AUDIO_STT_ENGINE: "openai"
      # Серверный TTS: тот же OPENAI_API_BASE_URL + /v1/audio/speech (прокси api → MWS).
      AUDIO_TTS_ENGINE: "openai"
      ENABLE_AUDIO_CONVERSATION: "True"
      # Все модели из ответа MWS /v1/models видны в селекторе; без ограничений «workspace».
      BYPASS_MODEL_ACCESS_CONTROL: "True"
      # Чтобы правки .env применялись после перезапуска без чистки тома (удобно на хакатоне).
      ENABLE_PERSISTENT_CONFIG: "False"
      ENABLE_NOTES: "False"
      ENABLE_EVALUATION_ARENA_MODELS: "False"
      WEBUI_NAME: ${WEBUI_NAME:-GPTHub}
      DEFAULT_LOCALE: ${DEFAULT_LOCALE:-ru-RU}
      DEFAULT_PROMPT_SUGGESTIONS: >-
        [
          {"title": ["Напиши текст", "для поста в соцсетях"], "content": "Напиши короткий пост для социальных сетей на тему, которую я опишу."},
          {"title": ["Объясни простыми словами", "как работает ИИ"], "content": "Объясни простыми словами, как работает искусственный интеллект, будто мне 12 лет."},
          {"title": ["Помоги с кодом", "на Python"], "content": "Помоги мне написать код на Python. Я опишу задачу, а ты предложи решение."},
          {"title": ["Составь план", "для изучения нового навыка"], "content": "Составь пошаговый план изучения нового навыка за 30 дней. Я скажу, какой навык."},
          {"title": ["Придумай идеи", "для подарка другу"], "content": "Придумай 5 необычных идей для подарка другу на день рождения."},
          {"title": ["Проанализируй данные", "и сделай выводы"], "content": "Я дам тебе данные, а ты проанализируй их и сделай выводы."}
        ]
      TITLE_GENERATION_PROMPT_TEMPLATE: >-
        ### Task:
        Сгенерируй краткий заголовок из 3-5 слов с эмодзи, описывающий историю чата.
        ### Правила:
        - Заголовок должен чётко отражать основную тему разговора.
        - Используй эмодзи для наглядности, но без кавычек и спецсимволов.
        - Всегда пиши заголовок на русском языке.
        - Точность важнее креативности — пиши понятно и просто.
        - Ответ должен содержать только JSON-объект, без вступлений и пояснений.
        ### Формат:
        JSON: { "title": "краткий заголовок" }
        ### Примеры:
        - { "title": "📉 Тренды фондового рынка" },
        - { "title": "🍪 Рецепт шоколадного печенья" },
        - { "title": "🤖 ИИ в медицине" },
        - { "title": "🎮 Разработка видеоигр" }
        ### История чата:
        <chat_history>
        {{MESSAGES:END:2}}
        </chat_history>
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-change-me-in-production}
      WEBUI_URL: ${WEBUI_URL:-http://localhost:3000}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8000}
      # Только ошибки UI; статус запросов к MWS смотри в логах сервиса api ([backend]).
      GLOBAL_LOG_LEVEL: ERROR
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      TRANSFORMERS_VERBOSITY: error
      CT_API_BASE: ${CT_API_BASE:-http://api:8000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  open-webui-data: {}
  generated-files: {}
