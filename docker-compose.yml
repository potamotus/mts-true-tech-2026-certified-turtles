services:
  # Единый фасад над MWS GPT: OpenAI-совместимый прокси для Open WebUI + агент-цикл.
  # Все чат-запросы из UI проходят через агент-цикл, чтобы в них автоматически попадали тулы.
  api:
    build: .
    command:
      - uv
      - run
      - uvicorn
      - certified_turtles.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --log-level
      - error
      - --no-access-log
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      MWS_API_KEY: ${MWS_API_KEY:-}
      MWS_API_BASE: ${MWS_API_BASE:-https://api.gpt.mws.ru}
      GENERATED_FILES_DIR: /data/generated
      UPLOADS_DIR: /data/generated/uploads
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8000}
      # Подробный трейс агента на stderr контейнера: [agent-debug] … (uvicorn остаётся --log-level error).
      CT_AGENT_DEBUG: ${CT_AGENT_DEBUG:-}
      CT_AGENT_DEBUG_MAX_CHARS: ${CT_AGENT_DEBUG_MAX_CHARS:-}
      # Google Docs: JSON service account + расшарить документ на client_email из ключа.
      # Раскомментируйте обе строки и положите ключ на хост, либо задайте абсолютный путь к файлу на хосте.
      # GOOGLE_DOCS_CREDENTIALS_JSON: /secrets/google-docs-sa.json
    volumes:
      - generated-files:/data/generated
      # Пример монтирования ключа (рядом с compose: mkdir -p secrets && cp sa.json secrets/google-docs-sa.json):
      # - ./secrets/google-docs-sa.json:/secrets/google-docs-sa.json:ro
    restart: unless-stopped

  open-webui:
    # Сборка из форка: переключатель Deep Research (ct_mode) в UI чата.
    build:
      context: ./open-webui-fork
      dockerfile: Dockerfile
      args:
        # Стабильный кеш: одно и то же значение при `docker compose build` без лишних --build-arg.
        # Переопределение: NODE_HEAP_MB=4096 в .env или docker compose build --build-arg NODE_HEAP_MB=4096
        NODE_HEAP_MB: ${NODE_HEAP_MB:-6144}
        # Не качает sentence-transformers/whisper в слое pip при сборке — меньше диска и времени (RAG при первом use).
        USE_SLIM: "${OPEN_WEBUI_USE_SLIM:-true}"
    image: certified-turtles-open-webui:local
    container_name: open-webui
    depends_on:
      - api
    ports:
      - "${OPEN_WEBUI_PORT:-3000}:8080"
    volumes:
      - open-webui-data:/app/backend/data
    env_file:
      - path: .env
        required: false
    environment:
      # Ollama не используем. OpenAI-совместимый источник — наш FastAPI (tools + agent loop).
      ENABLE_OLLAMA_API: "False"
      ENABLE_OPENAI_API: "True"
      OPENAI_API_KEY: ${MWS_API_KEY:-}
      # Агент (тулы): http://api:8000/v1 — второе подключение «просто чат»: http://api:8000/v1/plain (см. README).
      # Deep Research без раздувания списка моделей: второе подключение Open WebUI с
      # OPENAI_API_BASE_URL: http://api:8000/v1/m/deep_research (см. prompts/openwebui_modes.md).
      OPENAI_API_BASE_URL: http://api:8000/v1
      # Голос: по умолчанию Web Speech API в браузере. Серверный ASR — тот же API base + /v1/audio/transcriptions (прокси на MWS):
      #   AUDIO_STT_ENGINE: "openai"
      # Модель Whisper: CT_ASR_MODEL в сервисе api (по умолчанию whisper-1).
      AUDIO_STT_ENGINE: "web"
      AUDIO_TTS_ENGINE: "web"
      ENABLE_AUDIO_CONVERSATION: "True"
      # Все модели из ответа MWS /v1/models видны в селекторе; без ограничений «workspace».
      BYPASS_MODEL_ACCESS_CONTROL: "True"
      # Чтобы правки .env применялись после перезапуска без чистки тома (удобно на хакатоне).
      ENABLE_PERSISTENT_CONFIG: "False"
      WEBUI_NAME: ${WEBUI_NAME:-GPTHub}
      DEFAULT_LOCALE: ${DEFAULT_LOCALE:-ru-RU}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-change-me-in-production}
      WEBUI_URL: ${WEBUI_URL:-http://localhost:3000}
      # Только ошибки UI; статус запросов к MWS смотри в логах сервиса api ([backend]).
      GLOBAL_LOG_LEVEL: ERROR
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      TRANSFORMERS_VERBOSITY: error
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  open-webui-data: {}
  generated-files: {}
