services:
  # Опционально: ваш FastAPI (прокси / будущая логика). UI — в open-webui.
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      MWS_API_KEY: ${MWS_API_KEY:-}
      MWS_API_BASE: ${MWS_API_BASE:-https://api.gpt.mws.ru}
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.5
    container_name: open-webui
    ports:
      - "${OPEN_WEBUI_PORT:-3000}:8080"
    volumes:
      - open-webui-data:/app/backend/data
      - ./functions:/app/backend/data/functions
    env_file:
      - path: .env
        required: false
    environment:
      # Только внешний OpenAI-совместимый API (MWS GPT). Ollama не используем.
      ENABLE_OLLAMA_API: "False"
      ENABLE_OPENAI_API: "True"
      OPENAI_API_KEY: ${MWS_API_KEY:-}
      OPENAI_API_BASE_URL: ${MWS_API_BASE:-https://api.gpt.mws.ru}/v1
      # Все модели из ответа MWS /v1/models видны в селекторе; без ограничений «workspace».
      BYPASS_MODEL_ACCESS_CONTROL: "True"
      # Чтобы правки .env применялись после перезапуска без чистки тома (удобно на хакатоне).
      ENABLE_PERSISTENT_CONFIG: "False"
      WEBUI_NAME: ${WEBUI_NAME:-GPTHub}
      DEFAULT_LOCALE: ${DEFAULT_LOCALE:-ru-RU}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-change-me-in-production}
      WEBUI_URL: ${WEBUI_URL:-http://localhost:3000}
      # GPTHub Memory System
      ENABLE_FUNCTIONS: "True"
      MWS_GPT_API_KEY: ${MWS_GPT_API_KEY:-}
      MEMORY_EXTRACTION_MODEL: ${MEMORY_EXTRACTION_MODEL:-mws-gpt-alpha}
      MEMORY_CONFIDENCE_THRESHOLD: ${MEMORY_CONFIDENCE_THRESHOLD:-0.7}
      MEMORY_BATCH_SIZE: ${MEMORY_BATCH_SIZE:-5}
      MEMORY_BATCH_TIMEOUT_SEC: ${MEMORY_BATCH_TIMEOUT_SEC:-300}
      MEMORY_MAX_MEMORIES: ${MEMORY_MAX_MEMORIES:-5}
      MEMORY_MAX_TOKENS: ${MEMORY_MAX_TOKENS:-2000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  open-webui-data: {}
