          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '404':
          description: NotFound. Запрашиваемая сущность (пространство|нода|представление) не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '500':
