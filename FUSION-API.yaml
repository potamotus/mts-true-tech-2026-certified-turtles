openapi: 3.0.0
info:
  title: API по работе с данными в MWS Tables
  version: 1.0.0
paths:
  /fusion/v1/spaces/{spaceId}/datasheets:
    post:
      summary: Создание таблицы
      tags: [Datasheet - операции с таблицами]
      description: Создать таблицу с полями по умолчанию или с выбранными полями
      parameters:
        - name: spaceId
          in: path
          description: Идентификатор пространства
          required: true
          schema:
            type: string
          example: spc***
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDatasheetRequest'
      responses:
        '201':
          description: Таблица успешно создана с полями
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateDatasheetResponse'
                
  /fusion/v1/spaces/{spaceId}/datasheet/{dstId}:
    delete:
      summary: Удалить datasheet
      tags: [Datasheet - операции с таблицами]
      operationId: DeleteDatasheet
      parameters:
        - name: spaceId
          in: path
          description: ID пространства
          required: true
          schema:
            type: string
          example: spczJrh2i3tLW
        - name: dstId
          in: path
          description: ID таблицы
          required: true
          schema:
            type: string
          example: dst***
        - name: Authorization
          in: header
          description: Токен авторизации
          required: true
          schema:
            type: string
          example: Bearer usk***
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseDataDeleteNode'
        '400':
          description: Неверно заданы параметры
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidDeleteNodeResponse'
        '401':
          description: Не прошел авторизацию
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '403':
          description: Forbidden. Может возникнуть при неудачной проверке прав
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '404':
          description: NotFound. Запрашиваемая сущность (пространство|нода) не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'

  /fusion/v1/datasheets/{dstId}/records:
    get:
      summary: Получение записей с полями
      tags: [Records - записи]
      parameters:
        - name: dstId
          in: path
          description: ID даташита
          required: true
          schema:
            type: string
          example: dstFiaiw12AA
        - name: viewId
          in: query
          description: Возвращает записи для конкретного view. Скрытые записи в представлении не будут в результате выдачи
          required: false
          schema:
            type: string
          example: viwG9l1VPD6nH
        - name: pageSize
          in: query
          description: Максимальное кол-во записей. По умолчанию 100.
          required: false
          schema:
            type: integer
            default: 100
          example: 100
        - name: maxRecords
          in: query
          description: Как много записей вернется всего. Если передан pageSize, только maxRecords будут иметь эффект
          required: false
          schema:
            type: integer
          example: 1000
        - name: pageNum
          in: query
          description: Определяет номер страницы, когда используется с pageSize параметром. По умолчанию 1.
          required: false
          schema:
            type: integer
            default: 1
          example: 1
        - name: sort
          in: query
          description: Сортирует записи про возрастанию или убыванию или названию поля. (asc or desc) или field.
          required: false
          schema:
            type: array
            items:
              type: object
              properties:
                order:
                  type: string
                  enum: ['asc', 'desc']
                field:
                  type: string
          style: deepObject
          explode: true
        - name: recordIds
          in: query
          description: Возвращает конкретные записи. Разом может прийти 1000 записей
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: false
        - name: fields
          in: query
          description: Ограничивает выдачу записей по конкретным полям (fields).
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: false
        - name: filterByFormula
          in: query
          description: использует формулы для выдачи определенных записей
          required: false
          schema:
            type: string
          example: '{Title}="tittle 1"'
        - name: cellFormat
          in: query
          description: Тип value в ячейке. По умолчанию "json".
          required: false
          schema:
            type: string
            enum: ['string', 'json']
          example: string
        - name: fieldKey
          in: query
          description: Запрос по возврату полей. По умолчанию "name".
          required: false
          schema:
            type: string
            enum: ['name', 'id']
          example: name
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetRecordsData'
    post:
      summary: Создание записей в таблице данных
      tags: [Records - записи]
      parameters:
        - name: dstId
          in: path
          description: Идентификатор таблицы данных
          required: true
          schema:
            type: string
          example: dst0Yj5aNeoHldqvf6
        - name: viewId
          in: query
          description: При неявном указании возвращает все непустые поля; при явном указании возвращает непрятыми и непустыми полями в указанном представлении.
          required: false
          schema:
            type: string
          example: viwG9l1VPD6nH
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRecordsRequest'
      responses:
        '201':
          description: Записи успешно созданы
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateRecordsResponse'
    patch:
      summary: Обновление записей в таблице данных
      tags: [Records - записи]
      parameters:
        - name: dstId
          in: path
          description: Идентификатор таблицы данных
          required: true
          schema:
            type: string
          example: dst0Yj5aNeoHldqvf6
        - name: viewId
          in: query
          description: При неявном указании возвращает все непустые поля; при явном указании возвращает непрятыми и непустыми полями в указанном представлении.
          required: false
          schema:
            type: string
          example: viwG9l1VPD6nH
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRecordsRequest'
      responses:
        '200':
          description: Записи успешно обновлены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateRecordsResponse'
    delete:
      summary: Удаление записей из таблицы данных
      tags: [Records - записи]
      parameters:
        - name: dstId
          in: path
          description: Идентификатор таблицы данных AITable
          required: true
          schema:
            type: string
          example: dst0Yj5aNeoHldqvf6
        - name: recordIds
          in: query
          description: Идентификаторы записей для удаления
          required: true
          schema:
            type: array
            items:
              type: string
          style: form
          explode: false
          example: recwZ6yV3Srv3
      responses:
        '200':
          description: Записи успешно удалены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteRecordsResponse'

  /fusion/v1/timemachine/{dstId}:
    get:
      summary: Получить массив id удаленных записей
      tags: [Timemachine - Машина времени]
      description: Получить информацию о представлениях
      parameters:
        - name: dstId
          in: path
          description: Идентификатор таблицы данных (Datasheet)
          required: true
          schema:
            type: string
          example: dstNiC6R9MryevVaCQ
      responses:
        '200':
          description: Информация получена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetTimeMachineResponse'

  /fusion/v1/datasheets/{dstId}/fields:
    get:
      summary: Получение полей таблицы
      tags: [Fields - поля записей]
      parameters:
        - name: dstId
          in: path
          description: ID даташита
          required: true
          schema:
            type: string
          example: dstFiaiw12AA
        - name: viewId
          in: query
          description: ID представления. Если вы укажете представление, возвращаемые поля будут находиться в том же порядке, что и представление. Скрытые поля не будут возвращены.
          required: false
          schema:
            type: string
          example: viwG9l1VPD6nH
      responses:
        '200':
          description: Записи получены успешно
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetFieldsResponse'

  /fusion/v1/spaces/{spaceId}/datasheets/{dstId}/fields:
    post:
      tags: [Fields - поля записей]
      summary: Создание поля в таблице данных
      parameters:
        - name: spaceId
          in: path
          description: Идентификатор пространства (Space)
          required: true
          schema:
            type: string
          example: spcjXzqVrjaP3
        - name: dstId
          in: path
          description: Идентификатор таблицы данных (Datasheet)
          required: true
          schema:
            type: string
          example: dstNiC6R9MryevVaCQ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFieldRequest'
      responses:
        '200':
          description: Поле успешно создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateFieldResponse'

  /fusion/v1/spaces/{spaceId}/datasheets/{dstId}/fields/{fieldId}:
    delete:
      summary: Удаление поля из таблицы данных
      tags: [Fields - поля записей]
      parameters:
        - name: spaceId
          in: path
          description: Идентификатор пространства (Space)
          required: true
          schema:
            type: string
          example: spcjXzqVrjaP3
        - name: dstId
          in: path
          description: Идентификатор таблицы данных (Datasheet)
          required: true
          schema:
            type: string
          example: dstNiC6R9MryevVaCQ
        - name: fieldId
          in: path
          description: Идентификатор поля (Field)
          required: true
          schema:
            type: string
          example: fld7r18G7eSOu
      responses:
        '200':
          description: Поле успешно удалено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteFieldResponse'

  /fusion/v1/datasheets/{dstId}/views/{viewId}/fields/{fieldId}:
    patch:
      summary: Изменить индекс (порядок) поля
      description: Изменить положение поля в таблице, но нельзя установить индекс==0
      tags: [Fields - поля записей]
      parameters:
        - name: dstId
          in: path
          required: true
          description: "ID таблицы"
          schema:
            type: string
        - name: viewId
          in: path
          required: true
          description: "ID представления таблицы"
          schema:
            type: string
        - name: fieldId
          in: path
          required: true
          description: "ID поля"
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                index:
                  type: integer
      responses:
        '200':
          description: Успешное выполнение операции
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseResponse"
        '400':
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseResponse"
        '401':
          description: Неавторизованный запрос
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseResponse"
        '404':
          description: Поле не найдено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseResponse"
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseResponse"

  /fusion/v1/datasheets/{dstId}/views:
    get:
      summary: Получить информацию о представлениях
      tags: [Views]
      description: Получить информацию о представлениях
      parameters:
        - name: dstId
          in: path
          description: Идентификатор таблицы данных (Datasheet)
          required: true
          schema:
            type: string
          example: dstNiC6R9MryevVaCQ
      responses:
        '200':
          description: Информация получена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetViewsResponse'

  /fusion/v1/spaces/{spaceId}/datasheets/{dstId}/views:
    post:
      summary: Создать view
      tags: [Views]
      operationId: CreateView
      parameters:
        - name: spaceId
          in: path
          description: ID пространства
          required: true
          schema:
            type: string
          example: spczJrh2i3tLW
        - name: dstId
          in: path
          description: ID таблицы
          required: true
          schema:
            type: string
          example: dst***
        - name: Authorization
          in: header
          description: Токен авторизации
          required: true
          schema:
            type: string
          example: Bearer usk***
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateViewRequestBody'
      responses:
        '201':
          description: OK.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseDataCreateView'
        '400':
          description: Неверно заданы параметры
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidCreateViewResponse'
        '401':
          description: Не прошел авторизацию
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '403':
          description: Forbidden. Может возникнуть при неудачной проверке прав
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'

  /fusion/v1/spaces/{spaceId}/datasheets/{dstId}/views/{viewId}:
    delete:
      summary: Удалить view
      tags: [Views]
      operationId: DeleteView
      parameters:
        - name: spaceId
          in: path
          description: ID пространства
          required: true
          schema:
            type: string
          example: spczJrh2i3tLW
        - name: dstId
          in: path
          description: ID таблицы
          required: true
          schema:
            type: string
          example: dst***
        - name: Authorization
          in: header
          description: Токен авторизации
          required: true
          schema:
            type: string
          example: Bearer usk***
        - name: viewId
          in: path
          required: true
          schema:
            type: string
          example: viw**
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseDataDeleteView'
        '400':
          description: Неверно заданы параметры
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidDeleteViewResponse'
        '401':
          description: Не прошел авторизацию
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '403':
          description: Forbidden. Может возникнуть при неудачной проверке прав
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '404':
          description: NotFound. Запрашиваемая сущность (пространство|нода|представление) не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
    put:
      summary: Изменить название view
      tags: [Views]
      operationId: UpdateViewName
      parameters:
        - name: spaceId
          in: path
          description: ID пространства
          required: true
          schema:
            type: string
          example: spczJrh2i3tLW
        - name: dstId
          in: path
          description: ID таблицы
          required: true
          schema:
            type: string
          example: dst***
        - name: viewId
          in: path
          description: ID view
          required: true
          schema:
            type: string
          example: viw***
        - name: Authorization
          in: header
          description: Токен авторизации
          required: true
          schema:
            type: string
          example: Bearer usk***
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateViewNameRequestBody'
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseDataUpdateViewName'
        '400':
          description: Неверно заданы параметры
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidUpdateViewNameResponse'
        '401':
          description: Не прошел авторизацию
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '403':
          description: Forbidden. Может возникнуть при неудачной проверке прав
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '404':
          description: NotFound. Запрашиваемая сущность (пространство|нода|представление) не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'

