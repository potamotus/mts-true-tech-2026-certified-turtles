components:
  schemas:
    BaseResponse:
      type: object
      properties:
        success:
          type: boolean
        code:
          type: integer
          format: int32
        message:
          type: string
        data:
          type: object

    BackendResponse:
      type: object
      properties:
        success:
          type: boolean
        code:
          type: integer
          example: 200
        message:
          type: string
          example: SUCCESS

    GetRecordsData:
      allOf:
        - $ref: '#/components/schemas/BackendResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                pageNum:
                  type: integer
                records:
                  type: array
                  items:
                    $ref: '#/components/schemas/Record'
                pageSize:
                  type: integer
                total:
                  type: integer

    Record:
      type: object
      properties:
        recordId:
          type: string
        fields:
          type: object
        createdAt:
          type: integer
        updatedAt:
          type: integer

    CreateRecordsRequest:
      type: object
      properties:
        records:
          type: array
          items:
            type: object
            properties:
              fields:
                type: object
          description: "Массив полей"
        fieldKey:
          type: string
          description: "Ключ поля (fieldKey)"
          example: "name"
      required:
        - records
        - fieldKey

    CreateRecordsResponse:
      allOf:
        - $ref: '#/components/schemas/BackendResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/RecordsData'

    UpdateRecordsRequest:
      type: object
      properties:
        records:
          type: array
          items:
            type: object
            properties:
              recordId:
                type: string
                description: "Идентификатор записи"
              fields:
                $ref: '#/components/schemas/ExampleFieldToUpdate'
          description: "Массив записей"
        fieldKey:
          type: string
          description: "Ключ поля (fieldKey)"
          example: "name"
      required:
        - records
        - fieldKey

    ExampleFieldToUpdate:
      type: object
      properties:
        currency:
          type: number
          description: "Сумма в валюте"
        singleChoice:
          type: string
          description: "Одиночный выбор"

    UpdateRecordsResponse:
      allOf:
        - $ref: '#/components/schemas/BackendResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/RecordsData'

    DeleteRecordsResponse:
      allOf:
        - $ref: '#/components/schemas/BackendResponse'
        - type: object
          properties:
            data:
              type: boolean

    RecordsData:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/Record'

    GetFieldsResponse:
      allOf:
        - $ref: '#/components/schemas/BackendResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Fields'

    FieldsObject:
      type: object
      properties:
        fields:
          type: object
        fieldKey:
          type: string
          enum: ['name', 'id']
          default: 'name'

    Fields:
      type: object
      properties:
        fields:
          $ref: '#/components/schemas/FieldsArray'

    FieldsArray:
      type: array
      items:
        $ref: '#/components/schemas/Field'

    Field:
      type: object
      properties:
        id:
          type: string
          example: fidV3ElniQavTNyJG
        name:
          type: string
          example: Title
        type:
          $ref: '#/components/schemas/FieldTypeEnum'
          example: SingleText
        desc:
          type: string
          example: desc
        property:
          type: object

    FieldProperty:
      type: object
      properties:
        defaultValue:
          type: string
          description: Пример возможных пропов https://developers.aitable.ai/api/reference/#tag/Field

    CreateFieldRequest:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/FieldTypeEnum'
          example: SingleText
        name:
          type: string
          description: Имя поля (не более 100 символов)
        property:
          $ref: '#/components/schemas/FieldCreateProperty'

    CreateFieldResponse:
      allOf:
        - $ref: '#/components/schemas/BackendResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                id:
                  type: string
                name:
                  type: string

    DeleteFieldResponse:
      allOf:
        - $ref: '#/components/schemas/BackendResponse'
        - type: object
          properties:
            data:
              type: object

    UploadAttachmentResponse:
      allOf:
        - $ref: '#/components/schemas/BackendResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                token:
                  type: string
                  description: "Токен файла"
                name:
                  type: string
                  description: "Имя файла"
                size:
                  type: integer
                  description: "Размер файла в байтах"
                width:
                  type: integer
                  description: "Ширина изображения (если применимо)"
                height:
                  type: integer
                  description: "Высота изображения (если применимо)"
                mimeType:
                  type: string
                  description: "Тип файла"
                preview:
                  type: string
                  description: "Превью файла (если применимо)"
                url:
                  type: string
                  description: "URL файла"
              required:
                - token
                - height
                - width
                - name
                - size
                - mimeType

    FieldTypeEnum:
      type: string
      enum:
        - SingleText
        - Text
        - SingleSelect
        - MultiSelect
        - Number
        - Currency
        - Percent
        - DateTime
        - Attachment
        - Member
        - Checkbox
        - Rating
        - URL
        - Phone
        - Email
        - WorkDoc
        - OneWayLink
        - TwoWayLink
        - MagicLookUp
        - Formula
        - AutoNumber
        - CreatedTime
        - LastModifiedTime
        - CreatedBy
        - LastModifiedBy

    FieldCreateProperty:
      type: object
      description: "Параметры для конкретного типа поля, зависят от выбранного типа. Дополнительно: https://developers.aitable.ai/api/reference/#tag/Field"
      oneOf:
        - $ref: "#/components/schemas/SingleTextProperty"
        - $ref: "#/components/schemas/TextProperty"
        - $ref: "#/components/schemas/SingleSelectProperty"
        - $ref: "#/components/schemas/MultiSelectProperty"
        - $ref: "#/components/schemas/NumberProperty"
        - $ref: "#/components/schemas/CurrencyProperty"
        - $ref: "#/components/schemas/PercentProperty"
        - $ref: "#/components/schemas/DateTimeProperty"
        - $ref: "#/components/schemas/AttachmentProperty"
        - $ref: "#/components/schemas/MemberProperty"
        - $ref: "#/components/schemas/CheckboxProperty"
        - $ref: "#/components/schemas/RatingProperty"
        - $ref: "#/components/schemas/OneWayLinkProperty"
        - $ref: "#/components/schemas/MagicLinkProperty"
        - $ref: "#/components/schemas/MagicLookUpProperty"
        - $ref: "#/components/schemas/FormulaProperty"
        - $ref: "#/components/schemas/CreatedTimeProperty"
        - $ref: "#/components/schemas/LastModifiedTimeProperty"
        - $ref: "#/components/schemas/LastModifiedByProperty"
        - $ref: "#/components/schemas/ButtonProperty"

    SingleTextProperty:
      type: object
      properties:
        defaultValue:
          type: string
          description: "Текст по умолчанию"
        mask:
          $ref: "#/components/schemas/MaskProperty"

    TextProperty:
      type: object
      description: "Пустой объект для Text"
      properties:
        mask:
          $ref: "#/components/schemas/MaskProperty"

    SingleSelectProperty:
      type: object
      properties:
        options:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                description: "Название"
              color:
                type: string
                description: "Цвет"
          description: "Список опций"
        defaultValue:
          type: string
          description: "Значение по умолчанию"

    MultiSelectProperty:
      type: object
      properties:
        options:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                description: "Название"
              color:
                type: string
                description: "Цвет"
          description: "Список опций"
        defaultValue:
          type: string
          description: "Значение по умолчанию"

    NumberProperty:
      type: object
      properties:
        defaultValue:
          type: string
          description: "Значение по умолчанию"
        symbol:
          type: string
          description: "Символ"
        precision:
          type: integer
          description: "Точность (обязательное поле)"

    CurrencyProperty:
      type: object
      properties:
        defaultValue:
          type: string
        symbol:
          type: string
        precision:
          type: integer
        symbolAlign:
          type: string

    PercentProperty:
      type: object
      properties:
        defaultValue:
          type: string
        precision:
          type: integer
          description: "Точность (обязательное поле)"

    DateTimeProperty:
      type: object
      properties:
        dateFormat:
          type: string
          description: "Формат даты (обязательное поле)"
          enum: ["YYYY/MM/DD", "YYYY-MM-DD", "DD/MM/YYYY", "YYYY-MM", "MM-DD", "YYYY", "MM", "DD"]
        timeFormat:
          type: string
          enum: ["HH:mm", "hh:mm"]
        autoFill:
