              schema:
                $ref: '#/components/schemas/BaseResponse'

  /fusion/v1/spaces/{spaceId}/datasheets/{dstId}/views/{viewId}/hidden:
    post:
      summary: Скрытые поля
      tags: [Views]
      description: Настройка скрытых полей для представления.
      parameters:
        - name: spaceId
          in: path
          description: ID пространства
          required: true
          schema:
            type: string
