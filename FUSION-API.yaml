  /fusion/v1/datasheets/{dstId}/attachments:
    get:
      summary: Скачивание файла по токену вложения
      tags: [Attach-Upload - работа с вложениями]
      description: Скачать файл
      parameters:
        - name: dstId
          in: path
          description: Идентификатор таблицы данных (Datasheet)
          required: true
          schema:
            type: string
          example: dstNiC6R9MryevVaCQ
        - name: token
          in: query
          description: токен вложения из Tables
          required: true
          schema:
            type: string
          example: space/2024/06/14/b7a35d898a6c4895acb536b5f4a1df8a
      responses:
        '200':
          description: Файл загружен
          content:
            application/pdf:
              schema:
                type: string
                format: binary
                description: "тип вложения PDF указан ДЛЯ ПРИМЕРА - допустимые типы см. https://confluence.mts.ru/pages/viewpage.action?pageId=948844239"

        '400':
          description: "Ошибка на стороне пользователя. 1) Путь до файла не верный; 2) Формат dstId"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '401':
          description: "Не авторизован. Не передан токен/владелец не является участником пространства/владелец не имеет доступ на чтение в указанной таблице"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'        
        '404':
          description: "Не найдено. Указанные данные переданы в правильном формате, но не найдены: Файл по указанному URL"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '503':
          description: "Ошибка на стороне сервера"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'     
    post:
      summary: Добавление файла в пространство или в конкретную ячейку таблицы
      tags: [Attach-Upload - работа с вложениями]
      description: Загрузка одного файла. Если нужно загрузить несколько файлов - запрос повторяется. Если указать recordId и fieldId, то файл загрузится в нужную ячейку
      parameters:
        - name: dstId
          in: path
          description: Идентификатор таблицы данных (Datasheet)
          required: true
          schema:
            type: string
          example: dstNiC6R9MryevVaCQ
        - name: recordId
          in: query
          description: Id записи, куда добавить Файл
          required: false
          schema:
            type: string
        - name: fieldId
          in: query
          description: Id поля, куда добавить файл в указанной записи. Если id записи не передан, то получаем ошибку
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadAttachmentRequestBody'

      responses:
        '201':
          description: Файл загружен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadAttachmentSuccessResponse'
        '400':
          description: "Ошибка на стороне пользователя. 1) Файл не верный/тип файла не верный; 2) Формат dstId, recordId и fieldId не соответствует ожидаемому; 3) Передан recordId без указания fieldId и наоборот 4) Целевая ячейка имеет тип не предназначена для загрузки вложений"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '401':
          description: "Не авторизован. Не передан токен/владелец не является участником пространства/владелец не имеет доступ на создание/изменение в указанной таблице"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'        
        '404':
          description: "Не найдено. Указанные данные переданы в правильном формате, но не найдены: Таблица, Запись, Поле"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '503':
          description: "Ошибка на стороне сервера"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'  

