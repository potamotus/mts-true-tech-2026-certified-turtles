    CreateViewRequestBody:
      type: object
      required:
        - name
        - properties
      properties:
        name:
          type: string
        properties:
          type: object
          description: "Конфигурация представления"
          oneOf:
            - type: object
              required:
                - type
                - settings
              description: "Конфигурация представления канбан"
              properties:
                type:
                  type: string
                  enum:
                    - "Kanban"
                settings:
                  type: object
                  required:
                    - groupFieldId
                  properties:
                    groupFieldId:
                      type: string
                      description: "ID поля для группировки. Поддерживаются только поля типа 'мембер' или 'селект'."
            - type: object
              required:
                - type
              description: "Конфигурация представления сетка"
              properties:
                type:
                  type: string
                  enum:
                    - "Grid"
            - type: object
              required:
                - type
                - settings
              description: "Конфигурация представления гант"
              properties:
                type:
                  type: string
                  enum:
                    - "Gantt"
                settings:
                  type: object
                  required:
                    - startFieldId
                  properties:
                    startFieldId:
                      type: string
                      description: "ID поля, представляющего начало периода."
                    endFieldId:
                      type: string
                      description: "ID поля, представляющего конец периода."
                    linkFieldId:
                      type: string
                      description: "ID поля для связки с другим элементом диаграммы."
            - type: object
              required:
                - type
                - settings
              description: "Конфигурация представления архитектура"
              properties:
                type:
                  type: string
                  enum:
                    - "Architecture"
                settings:
                  type: object
                  required:
                    - linkFieldId
                  properties:
                    linkFieldId:
                      type: string
                      description: "ID поля для связки с элементом архитектуры."
            - type: object
              required:
                - type
              description: "Конфигурация представления галерея"
              properties:
                type:
                  type: string
                  enum:
                    - "Gallery"
            - type: object
              required:
                - type
                - settings
              description: "Конфигурация представления календарь"
              properties:
                type:
                  type: string
                  enum:
                    - "Calendar"
                settings:
                  type: object
                  required:
                    - startFieldId
                  properties:
                    startFieldId:
                      type: string
                      description: "ID поля, представляющего начало периода."
                    endFieldId:
                      type: string
                      description: "ID поля, представляющего конец периода."

